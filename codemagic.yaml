workflows:
  android-apk:
    name: Rabbit - Android APK

    max_build_duration: 120

    environment:
      node: 22
      java: 21
      android_sdk:
        api_level: 34

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Vite app
        script: |
          npm run build

      - name: Verify dist folder
        script: |
          ls -la dist/

      - name: Add Android platform
        script: |
          npx cap add android || true

      - name: Sync Capacitor
        script: |
          npx cap sync android

      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/apk/**/*.apk
      - android/app/build/outputs/bundle/**/*.aab

    publishing:
      email:
        recipients:
          - redstarstore0@gmail.com
        notify:
          success: true
          failure: true
